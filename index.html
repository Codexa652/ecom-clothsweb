<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanWear - Clothing Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#111;
  --accent:#ff4d4d;
  --light:#f9f9f9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--light);
  color:#333;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  z-index:1000;
}

.nav-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 8%;
}

.logo{
  font-weight:700;
  font-size:1.4rem;
}

.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:#333;
  font-weight:500;
}

.cart-icon{
  position:relative;
  cursor:pointer;
  font-size:22px;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  background:var(--accent);
  color:white;
  font-size:12px;
  padding:3px 7px;
  border-radius:50%;
}

/* HERO */
.hero{
  height:100vh;
  background:url("https://images.unsplash.com/photo-1523381294911-8d3cead13475") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

.hero h1{
  font-size:3rem;
  margin-bottom:20px;
}

.hero button{
  padding:12px 30px;
  border:none;
  background:var(--accent);
  color:white;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.hero button:hover{
  background:#e60000;
}

/* PRODUCTS */
.products{
  padding:100px 8% 60px;
}

.products h2{
  text-align:center;
  margin-bottom:40px;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.product-card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  transition:0.3s;
}

.product-card:hover{
  transform:translateY(-5px);
}

.product-card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.product-info{
  padding:20px;
}

.product-info h3{
  margin-bottom:10px;
}

.product-info p{
  margin-bottom:15px;
  font-weight:600;
}

.product-info button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.product-info button:hover{
  background:var(--accent);
}

/* CART PANEL */
.cart{
  position:fixed;
  top:0;
  right:-400px;
  width:350px;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,0.1);
  padding:20px;
  transition:0.4s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}

.cart.active{
  right:0;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back-btn{
  background:none;
  border:none;
  font-size:14px;
  cursor:pointer;
  color:var(--accent);
  font-weight:600;
}

.cart-items{
  flex:1;
  overflow-y:auto;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  font-size:14px;
}

.cart-item button{
  background:none;
  border:none;
  color:red;
  cursor:pointer;
}

.cart-total{
  font-weight:700;
  margin:15px 0;
}

.checkout-btn{
  padding:12px;
  border:none;
  background:var(--accent);
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:50px;
}

@media(max-width:768px){
  .hero h1{
    font-size:2rem;
  }
}
</style>
</head>
<body>

<nav>
  <div class="nav-container">
    <div class="logo">UrbanWear</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#products">Shop</a>
    </div>
    <div class="cart-icon" id="cartIcon">
      🛒
      <div class="cart-count" id="cartCount">0</div>
    </div>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>New Season Collection</h1>
    <button onclick="document.getElementById('products').scrollIntoView()">Shop Now</button>
  </div>
</section>

<section class="products" id="products">
  <h2>Featured Products</h2>
  <div class="product-grid" id="productGrid"></div>
</section>

<div class="cart" id="cart">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="back-btn" onclick="closeCart()">← Back</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total" id="cartTotal">Total: $0</div>
  <button class="checkout-btn">Checkout</button>
</div>

<footer>
  <p>© 2026 UrbanWear. All rights reserved.</p>
</footer>

<script>
const products = [
  {id:1,name:"Classic Hoodie",price:49,image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {id:2,name:"Oversized T-Shirt",price:29,image:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
  {id:3,name:"Denim Jacket",price:89,image:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
  {id:4,name:"Cargo Pants",price:69,image:"https://images.unsplash.com/photo-1593032465175-481ac7f401d1"},
  {id:5,name:"Classic Hoodie",price:49,image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {id:6,name:"Oversized T-Shirt",price:29,image:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
  {id:7,name:"Denim Jacket",price:89,image:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
  {id:8,name:"Cargo Pants",price:69,image:"https://images.unsplash.com/photo-1593032465175-481ac7f401d1"},
  {id:9,name:"Classic Hoodie",price:49,image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {id:10,name:"Oversized T-Shirt",price:29,image:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
  {id:11,name:"Denim Jacket",price:89,image:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
  {id:12,name:"Cargo Pants",price:69,image:"https://images.unsplash.com/photo-1593032465175-481ac7f401d1"}
];

const productGrid = document.getElementById("productGrid");
const cartIcon = document.getElementById("cartIcon");
const cart = document.getElementById("cart");
const cartItems = document.getElementById("cartItems");
const cartCount = document.getElementById("cartCount");
const cartTotal = document.getElementById("cartTotal");

let cartData = [];

products.forEach(product=>{
  const card = document.createElement("div");
  card.classList.add("product-card");
  card.innerHTML = `
    <img src="${product.image}">
    <div class="product-info">
      <h3>${product.name}</h3>
      <p>$${product.price}</p>
      <button onclick="addToCart(${product.id})">Add to Cart</button>
    </div>
  `;
  productGrid.appendChild(card);
});

function addToCart(id){
  const product = products.find(p=>p.id===id);
  cartData.push(product);
  updateCart();
  cart.classList.add("active");
}

function updateCart(){
  cartItems.innerHTML="";
  let total=0;
  cartData.forEach((item,index)=>{
    total+=item.price;
    cartItems.innerHTML+=`
      <div class="cart-item">
        ${item.name} - $${item.price}
        <button onclick="removeItem(${index})">x</button>
      </div>
    `;
  });
  cartCount.textContent=cartData.length;
  cartTotal.textContent="Total: $"+total;
}

function removeItem(index){
  cartData.splice(index,1);
  updateCart();
}

function closeCart(){
  cart.classList.remove("active");
}

cartIcon.addEventListener("click",()=>{
  cart.classList.toggle("active");
});
</script>

</body>
</html>
